# knobs.yaml — trivial-tip-converter's Orchestrator answer key (staged; block 02-01 recipe).
# The seeder overwrites the live copy at meta/agents/tron/knobs.yaml from this file at
# seed time; `run.py`/`bootstrap.reconcile_config` re-copies it post-seed and refuses to
# launch on any staged != live diff. Shape: tron-app/contracts/schema/knobs.schema.yaml.
#
# Grading index (tron-meta/sims/README.md): trivial tier cadence = `code: 1` so the one
# shipped reviewer (reviewer-code) fires within this tier's 2-remaining-block run
# (01-02, 01-03 — 01-01 ships already done as the scaffold baseline).

knobs:
  worker_count: 2          # engineers + reviewers share this pool; architect excluded
  # Block 02-11 T1 (ADR-0002 D4): the 02-10 per-role `worker_model` map is RETIRED —
  # `meta/tron/roles.yaml`'s own `model:` field per role is now the single
  # authoritative model source (`fsm._model_for_role` resolves `role.model` there
  # alone, fail-closed on absence — no borrowing, no default). Setting a
  # `worker_model` key here would be dead config: the engine no longer reads it.
  # Block 02-12 T4b reconcile (ADR-0003 D-D/D-J, BLOCKER-2 resolved): the dead
  # `architect_count: 1` knob is REMOVED here too — the engine reads it nowhere
  # (single architect this version; `roles.yaml architect: cardinality:1` is the
  # one authoritative source). Leaving an unread knob staged risked exactly the
  # kind of silent drift this sweep is closing — not a harmless no-op.
  git: on
  ask_before_merging: false   # gates operator sign-off before the grant mints; the Orchestrator
                              # never merges — the worker lands via land.sh (ADR-0002 D1). No
                              # remote → no PR to watch.
  silence_ping_min: 6
  silence_escalate_min: 8
  gate_idle_cap: 3
  gate_nudge_after: 2
  gate_close_cap: 3
  case_reping_after: 20
  case_reping_max: 3
  wake_cooldown_sec: 5
  wake_ceiling_sec: 30
  # ADR-0003 D-A (block 02-12 T4a/T1 reconcile): the retired `carve_observe_ticks`
  # tick-count wall is replaced by this wall-clock LIVENESS dial (a not-yet-carved
  # worker trips the ORDINARY worker-liveness path past this many idle seconds —
  # never a carve-specific wall). Declared explicitly, not left to the engine's
  # own 300s default, so this SIM's carve-liveness behavior is a deliberate,
  # measured choice, never an undeclared engine default.
  carve_liveness_timeout: 300
  # Block 02-12 T4b reconcile (scaffold-realism audit): four more engine-read
  # knobs this scaffold silently rode the engine's own default for — staged
  # explicitly so every knob the engine actually reads is a DELIBERATE choice
  # this SIM controls, never an undeclared default (which would distort
  # measurement). Values match the engine's own documented defaults
  # (`contracts/schema/knobs.schema.yaml`, `fsm.py`'s own `.get(key, default)`
  # call sites) — staged, not merely inherited.
  gate_step_cap: 2             # CASE-008's own wall cap: ordinary attempts before a stuck gate walls
  grant_ttl: 60                # minutes a minted merge/close grant stays live before expiring
  abandon_flag_window: 60      # minutes an abandon flag may ride unread before it escalates (ADR-0002 D3)
  trunk_refresh_deathcap: 3    # consecutive trunk-refresh failures before a loud halt
  # ADR-0003 D-J (block 02-12 T4a): AIDE's own model — an engine-BUILTIN LLM lane
  # (never a roles.yaml capability class/role). Staged here (never roles.yaml,
  # per the write-boundary rule) and threaded into the bootup model question's
  # `staged_model["aide"]` by the live-boot launcher (`bootstrap.
  # write_live_boot_launcher`), so a live run's AIDE model is this SIM's own
  # declared choice, never silently the engine's built-in `AIDE_DEFAULT_MODEL`.
  aide_model: claude-opus-4-8

# ── Reviewer cadence (PULL): <type> -> blocks between reviews ──
cadence:
  code: 1

# ── Peer-consult pairs (R2) — none needed at this scale ──
peer_consults: []
