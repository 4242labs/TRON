# scaffold.yaml — the per-sim reset descriptor bootstrap.py reads (sims/autopilot/bootstrap.py
# `load_scaffold_descriptor` / `reset_to_scaffold`). `scaffold_ref` names a git ref in THIS
# repo's own history whose tree is the scaffold-only app state (the commit landed by block
# 01-01) — bootstrap resets the app tree (never meta/) to this tree before a run starts, so
# TRON only has to do the forward blocks (01-02, 01-03) each replica.

scaffold_ref: block-01-01-scaffold   # tag on the 01-01 commit; see also its short sha below
# db83aaeef70df7eb51e8a1c633792a71aedf5122 (recorded for reference; the tag is authoritative —
# `git rev-parse block-01-01-scaffold` resolves it in any clone of this source, tags included)

main_branch: main   # optional override; matches project.yaml's repo.main_branch
