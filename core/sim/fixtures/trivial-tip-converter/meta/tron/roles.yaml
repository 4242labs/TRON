# meta/tron/roles.yaml — trivial-tip-converter's fleet (ADR-0002 Decision 4; block
# 02-11 T1). Project-authored; the engine ships no personas and hardcodes no role
# name — every worker identity, model, persona path, dispatch-selector match, and
# paperwork scope is a lookup against THIS file, validated fail-closed at engine
# construction (`RolesConfig.load`).
#
# This is the trivial scaffold default (engineer / reviewer-code / architect) — the
# same fleet AC-1 proves runs unchanged from this file alone. `model:` is now the
# SINGLE authoritative model source (block 02-11 T1 retires the 02-10 `knobs.yaml`
# per-role `worker_model` map — the engine no longer reads it; `fsm._model_for_role`
# resolves `role.model` here alone, fail-closed on absence).

roles:
  engineer:
    persona: meta/agents/engineer.md
    model: claude-sonnet-5
    binds: [BUILD, CLOSE]
    paperwork:
      allow: ["{block_doc}", "{archive}", "meta/logs/engineering/"]
      line_scoped: { "{pipeline}": "{block_id}" }

  reviewer-code:
    persona: meta/agents/reviewer-code.md
    model: claude-sonnet-5
    binds: [REVIEW]

  architect:
    persona: meta/agents/architect.md
    model: claude-opus-4-8
    binds: [TRIAGE]
    persistent: true
    cardinality: 1
    spec_owner: true
    paperwork: { allow: ["{pipeline}", "{blocks_dir}"] }

# ── Staged example (NOT live — commented out): injecting a new role is config only,
# no engine change (ADR-0002 D4). A designer bound to BUILD via a block-tag selector,
# picking up design-tagged blocks the default `engineer` builder never sees. Uncomment
# + author `meta/agents/designer.md` (persona) to activate; boot validation would then
# require its own resolvable CLOSE path (either `binds: [BUILD, CLOSE]` here too, or
# leaving `engineer` as the CLOSE fallback — a single CLOSE-binding role is always its
# own implicit fallback, no `close_fallback:` flag needed while only `engineer` binds
# CLOSE).
#
#   designer:
#     persona: meta/agents/designer.md
#     model: claude-sonnet-5
#     binds: [BUILD]
#     selector: { block_tag: design }
