# project.yaml — trivial-tip-converter's TRON answer key (staged; block 02-01 recipe).
# Consulted by the seeder at seed time (per tron-seed.md's own protocol — every operator
# answer is pre-staged here and in knobs.yaml). The seeder writes the LIVE copy at
# meta/agents/tron/project.yaml (stamping tron_version from canon VERSION); this file
# never changes at seed time. Shape: tron-app/contracts/schema/project.schema.yaml.

tron_version: 0.4.1   # tracks canon VERSION as of authoring; the seeder restamps the live copy regardless

pointers:
  agents: meta/agents/

# ── Canon pipeline (git-tracked; agents write via PR/merge, TRON only reads) ──
pipeline_path: meta/pipeline.md
blocks_dir:    meta/blocks/
archive_dir:   meta/blocks/archive/

# ── Paperwork area (tron-13 D1) — what the engine may land on trunk for a worker ──
paperwork_paths:
  - meta/

# ── Agents available (the trivial 3-agent set; scanned from pointers.agents) ──
agents:
  - role: architect
    file: meta/agents/architect.md
  - role: engineer
    file: meta/agents/engineer.md
  - role: reviewer-code
    file: meta/agents/reviewer-code.md

# ── Detected repo facts ──
# Single-repo project: app code and meta/ live in the SAME checkout, so repo.root is the
# checkout itself ("." — relative to the instance's own cwd, which the engine chdir's to
# before every session per the launcher contract). No separate app/meta repo split.
repo:
  name: trivial-tip-converter
  root: .
  main_branch: main
  staging: none          # no staging deploy in the trivial tier
  remote: none           # no git remote — a local shakeout; TRON reads HEAD in place, no fetch
  worktrees_dir: ../worktrees/
  logs_dir: meta/logs/

conventions:
  branch_naming: "{type}/{block-id}-{slug}"      # type in feat|fix|chore
  block_id_pattern: "{phase}-{seq}-{slug}"        # e.g. 01-02-logic
  worker_id_pattern: "{ROLE}-{block-stripped}"
  commit_convention: "present-tense, lowercase"
  pr_title_rule: "N/A — no remote, no PRs; merges land directly on main"

notifications:
  telegram: off

protected_branches:
  - repo: trivial-tip-converter
    branch: main

# ── Declared test command (block 01-28: the trunk-stage trusted-verdict model) ──
# The engine runs this ONCE in a clean, detached `git worktree` at the merged sha
# (engine/trunk.py `_run_declared_command`) — that checkout has NO `node_modules`
# (gitignored here, never committed: verified `git ls-files | grep node_modules` is
# empty) and the harness (sims/autopilot/bootstrap.py) performs no pre-install step of
# its own. `package-lock.json` IS tracked, so `npm ci` installs deterministically from
# it; network reachability to the npm registry was verified live in this dev sandbox
# (`curl -sI https://registry.npmjs.org/vitest` -> 200) and a real timed run of this
# exact command in a scratch `git worktree add --detach` checkout of this repo's HEAD
# completed in ~13s (9/9 vitest assertions green) — comfortably inside trunk.py's
# 300s `_TEST_TIMEOUT`. This mirrors the project's own documented dev-loop pattern
# (`meta/skills/skill-validate.md`: "npm install # first run only"): install-then-run,
# self-contained, no assumption of a pre-warmed checkout.
test:
  command: "npm ci --no-audit --no-fund && npx vitest run"

operator_only_tasks: []
local_validation_gaps: []
ci: {}
deploy: {}
notes: "Trivial tier of the TRON sim target set (tron-meta/sims/README.md) — single-repo, no remote, no deploy check. Plants nothing: no needs-user blocks, no await_confirm."
